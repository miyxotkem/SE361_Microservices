apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-deployment
  labels:
    app: gateway-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-service
  template:
    metadata:
      labels:
        app: gateway-service
    spec:
      imagePullSecrets:
        - name: ghcr-io-registry-key
      containers:
        - name: gateway-api
          image: ghcr.io/username/smartedu-gateway:latest # Placeholder, updated during CD
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: "Development"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://jaeger:4317"
            - name: ReverseProxy__Clusters__identity-cluster__Destinations__destination1__Address
              value: "http://identity-service:8080"
            - name: ReverseProxy__Clusters__course-cluster__Destinations__destination1__Address
              value: "http://course-service:8080"
            - name: ReverseProxy__Clusters__exam-cluster__Destinations__destination1__Address
              value: "http://exam-service:8080"
            - name: ReverseProxy__Clusters__notification-cluster__Destinations__destination1__Address
              value: "http://notification-service:8080"
            - name: ReverseProxy__Clusters__comment-cluster__Destinations__destination1__Address
              value: "http://comment-service:8080"
            - name: ReverseProxy__Clusters__payment-cluster__Destinations__destination1__Address
              value: "http://payment-service:8080"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
spec:
  selector:
    app: gateway-service
  ports:
    - name: http
      port: 7000
      targetPort: 8080
  type: LoadBalancer

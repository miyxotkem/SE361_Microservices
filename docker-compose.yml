version: '3.4'

services:
  messagebroker:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"

  yarpapigateway:
    image: smartedu-gateway
    build:
      context: .
      dockerfile: ApiGateways/YarpApiGateway/Dockerfile
    ports:
      - "7000:8080"
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_TRACE_SAMPLING_RATIO=1.0
    depends_on:
      - identity.api
      - course.api
      - exam.api
      - notification.api
      - comment.api
      - payment.api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  identity.api:
    image: smartedu-identity
    build:
      context: .
      dockerfile: Services/Identity/Identity.API/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - MessageBroker:Host=rabbitmq://messagebroker
      - ConnectionStrings:DefaultConnection=${IDENTITY_DB_CONNECTION}
      - Jwt:Key=${JWT_KEY}
      - Jwt:Issuer=${JWT_ISSUER}
      - Jwt:Audience=${JWT_AUDIENCE}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - Redis:ConnectionString=redis:6379
      - OTEL_TRACE_SAMPLING_RATIO=1.0
    depends_on:
      - redis
    volumes:
      - ./firebase:/app/firebase
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  course.api:
    image: smartedu-course
    build:
      context: .
      dockerfile: Services/Course/Course.API/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - MessageBroker:Host=rabbitmq://messagebroker
      - Redis:ConnectionString=redis:6379
      - Jwt:Key=${JWT_KEY}
      - Jwt:Issuer=${JWT_ISSUER}
      - Jwt:Audience=${JWT_AUDIENCE}
      - FIREBASE_CREDENTIALS_JSON_COURSE=${FIREBASE_CREDENTIALS_JSON_COURSE}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_TRACE_SAMPLING_RATIO=1.0
    depends_on:
      - messagebroker
    volumes:
      - ./firebase:/app/firebase
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  exam.api:
    image: smartedu-exam
    build:
      context: .
      dockerfile: Services/Exam/Exam.API/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - MessageBroker:Host=rabbitmq://messagebroker
      - GrpcSettings:CourseUrl=http://course.api:8081
      - GrpcSettings:IdentityUrl=http://identity.api:8081
      - Jwt:Key=${JWT_KEY}
      - Jwt:Issuer=${JWT_ISSUER}
      - Jwt:Audience=${JWT_AUDIENCE}
      - FIREBASE_CREDENTIALS_JSON_EXAM=${FIREBASE_CREDENTIALS_JSON_EXAM}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - Redis:ConnectionString=redis:6379
      - OTEL_TRACE_SAMPLING_RATIO=1.0
    depends_on:
      - messagebroker
      - redis
    volumes:
      - ./firebase:/app/firebase
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  notification.api:
    image: smartedu-notification
    build:
      context: .
      dockerfile: Services/Notification/Notification.API/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - MessageBroker:Host=rabbitmq://messagebroker
      - GrpcSettings:CourseUrl=http://course.api:8081
      - Jwt:Key=${JWT_KEY}
      - Jwt:Issuer=${JWT_ISSUER}
      - Jwt:Audience=${JWT_AUDIENCE}
      - FIREBASE_CREDENTIALS_JSON_NOTIFICATION=${FIREBASE_CREDENTIALS_JSON_NOTIFICATION}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_TRACE_SAMPLING_RATIO=1.0
    depends_on:
      - messagebroker
    volumes:
      - ./firebase:/app/firebase
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  comment.api:
    image: smartedu-comment
    build:
      context: .
      dockerfile: Services/Comment/Comment.API/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Jwt:Key=${JWT_KEY}
      - Jwt:Issuer=${JWT_ISSUER}
      - Jwt:Audience=${JWT_AUDIENCE}
      - FIREBASE_CREDENTIALS_JSON_COMMENT=${FIREBASE_CREDENTIALS_JSON_COMMENT}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - Redis:ConnectionString=redis:6379
      - OTEL_TRACE_SAMPLING_RATIO=1.0
    depends_on:
      - redis
    volumes:
      - ./firebase:/app/firebase
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  payment.api:
    image: smartedu-payment
    build:
      context: .
      dockerfile: Services/Payment/Payment.API/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - MessageBroker:Host=rabbitmq://messagebroker
      - Redis:ConnectionString=redis:6379
      - ConnectionStrings:DefaultConnection=${PAYMENT_DB_CONNECTION}
      - Jwt:Key=${JWT_KEY}
      - Jwt:Issuer=${JWT_ISSUER}
      - Jwt:Audience=${JWT_AUDIENCE}
      - VnPay:HashSecret=${VNPAY_HASH_SECRET}
      - MoMo:SecretKey=${MOMO_SECRET_KEY}
      - PayPal:SecretKey=${PAYPAL_SECRET_KEY}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_TRACE_SAMPLING_RATIO=1.0
    depends_on:
      - messagebroker
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317" # OTLP gRPC receiver
      - "4318:4318" # OTLP HTTP receiver
    depends_on:
      - jaeger
      - loki

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - otel-collector

  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus
      - loki
      - jaeger


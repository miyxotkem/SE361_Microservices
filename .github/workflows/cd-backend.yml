name: Backend CD

on:
  push:
    branches:
      - main
    paths:
      - 'Services/**'
      - 'BuildingBlocks/**'
      - 'ApiGateways/**'
      - '.github/workflows/cd-backend.yml'

jobs:
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      shared: ${{ steps.filter.outputs.shared }}
      workflow: ${{ steps.filter.outputs.workflow }}
      gateway: ${{ steps.filter.outputs.gateway }}
      identity: ${{ steps.filter.outputs.identity }}
      course: ${{ steps.filter.outputs.course }}
      exam: ${{ steps.filter.outputs.exam }}
      notification: ${{ steps.filter.outputs.notification }}
      comment: ${{ steps.filter.outputs.comment }}
      payment: ${{ steps.filter.outputs.payment }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Path Filter
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            shared:
              - 'BuildingBlocks/**'
            workflow:
              - '.github/workflows/cd-backend.yml'
            gateway:
              - 'ApiGateways/YarpApiGateway/**'
            identity:
              - 'Services/Identity/**'
            course:
              - 'Services/Course/**'
            exam:
              - 'Services/Exam/**'
            notification:
              - 'Services/Notification/**'
            comment:
              - 'Services/Comment/**'
            payment:
              - 'Services/Payment/**'

  build-and-deploy-gateway:
    name: Build & Deploy Gateway
    needs: detect-changes
    if: needs.detect-changes.outputs.gateway == 'true' || needs.detect-changes.outputs.shared == 'true' || needs.detect-changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set lower case owner name
        run: echo "OWNER_LC=${OWNER,,}" >> $GITHUB_ENV
        env:
          OWNER: '${{ github.repository_owner }}'

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ApiGateways/YarpApiGateway/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/smartedu-gateway:latest
            ghcr.io/${{ env.OWNER_LC }}/smartedu-gateway:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script: |
            cd ${{ secrets.PROJECT_PATH }}
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ghcr.io/${{ env.OWNER_LC }}/smartedu-gateway:latest
            docker tag ghcr.io/${{ env.OWNER_LC }}/smartedu-gateway:latest smartedu-gateway:latest
            docker compose up -d yarpapigateway

  build-and-deploy-identity:

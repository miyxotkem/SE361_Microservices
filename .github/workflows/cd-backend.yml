name: Backend CD

on:
  push:
    branches:
      - main
    paths:
      - 'Services/**'
      - 'BuildingBlocks/**'
      - 'ApiGateways/**'
      - '.github/workflows/cd-backend.yml'

jobs:
  detect-changes:
    name: Detect Changed Services
    runs-on: self-hosted
    outputs:
      shared: ${{ steps.filter.outputs.shared }}
      workflow: ${{ steps.filter.outputs.workflow }}
      gateway: ${{ steps.filter.outputs.gateway }}
      identity: ${{ steps.filter.outputs.identity }}
      course: ${{ steps.filter.outputs.course }}
      exam: ${{ steps.filter.outputs.exam }}
      notification: ${{ steps.filter.outputs.notification }}
      comment: ${{ steps.filter.outputs.comment }}
      payment: ${{ steps.filter.outputs.payment }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Path Filter
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            shared:
              - 'BuildingBlocks/**'
            workflow:
              - '.github/workflows/cd-backend.yml'
            gateway:
              - 'ApiGateways/YarpApiGateway/**'
            identity:
              - 'Services/Identity/**'
            course:
              - 'Services/Course/**'
            exam:
              - 'Services/Exam/**'
            notification:
              - 'Services/Notification/**'
            comment:
              - 'Services/Comment/**'
            payment:
              - 'Services/Payment/**'

  build-and-deploy-gateway:
    name: Build & Deploy Gateway
    needs: detect-changes
    if: needs.detect-changes.outputs.gateway == 'true' || needs.detect-changes.outputs.shared == 'true' || needs.detect-changes.outputs.workflow == 'true'
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy Local
        run: |
          cd ~/app/SE361_Microservices
          git pull origin main
          docker compose build yarpapigateway
          docker compose up -d --no-deps yarpapigateway

  build-and-deploy-identity:
    name: Build & Deploy Identity
    needs: detect-changes
    if: needs.detect-changes.outputs.identity == 'true' || needs.detect-changes.outputs.shared == 'true' || needs.detect-changes.outputs.workflow == 'true'
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy Local
        run: |
          cd ~/app/SE361_Microservices
          git pull origin main
          docker compose build identity.api
          docker compose up -d --no-deps identity.api

  build-and-deploy-course:
    name: Build & Deploy Course
    needs: detect-changes
    if: needs.detect-changes.outputs.course == 'true' || needs.detect-changes.outputs.shared == 'true' || needs.detect-changes.outputs.workflow == 'true'
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy Local
        run: |
          cd ~/app/SE361_Microservices
          git pull origin main
          docker compose build course.api
          docker compose up -d --no-deps course.api

  build-and-deploy-exam:
    name: Build & Deploy Exam
    needs: detect-changes
    if: needs.detect-changes.outputs.exam == 'true' || needs.detect-changes.outputs.shared == 'true' || needs.detect-changes.outputs.workflow == 'true'
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy Local
        run: |
          cd ~/app/SE361_Microservices
          git pull origin main
          docker compose build exam.api
          docker compose up -d --no-deps exam.api

  build-and-deploy-notification:
    name: Build & Deploy Notification
    needs: detect-changes
    if: needs.detect-changes.outputs.notification == 'true' || needs.detect-changes.outputs.shared == 'true' || needs.detect-changes.outputs.workflow == 'true'
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy Local
        run: |
          cd ~/app/SE361_Microservices
          git pull origin main
          docker compose build notification.api
          docker compose up -d --no-deps notification.api

  build-and-deploy-comment:
    name: Build & Deploy Comment
    needs: detect-changes
    if: needs.detect-changes.outputs.comment == 'true' || needs.detect-changes.outputs.shared == 'true' || needs.detect-changes.outputs.workflow == 'true'
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy Local
        run: |
          cd ~/app/SE361_Microservices
          git pull origin main
          docker compose build comment.api
          docker compose up -d --no-deps comment.api

  build-and-deploy-payment:
    name: Build & Deploy Payment
    needs: detect-changes
    if: needs.detect-changes.outputs.payment == 'true' || needs.detect-changes.outputs.shared == 'true' || needs.detect-changes.outputs.workflow == 'true'
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy Local
        run: |
          cd ~/app/SE361_Microservices
          git pull origin main
          docker compose build payment.api
          docker compose up -d --no-deps payment.api

name: Backend CD

on:
  push:
    branches:
      - main
    paths:
      - 'Services/**'
      - 'BuildingBlocks/**'
      - 'ApiGateways/**'
      - 'k8s/**'
      - '.github/workflows/cd-backend.yml'

permissions:
  contents: read
  packages: write

jobs:
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      shared: ${{ steps.filter.outputs.shared }}
      workflow: ${{ steps.filter.outputs.workflow }}
      gateway: ${{ steps.filter.outputs.gateway }}
      identity: ${{ steps.filter.outputs.identity }}
      course: ${{ steps.filter.outputs.course }}
      exam: ${{ steps.filter.outputs.exam }}
      notification: ${{ steps.filter.outputs.notification }}
      comment: ${{ steps.filter.outputs.comment }}
      payment: ${{ steps.filter.outputs.payment }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Path Filter
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            shared:
              - 'BuildingBlocks/**'
            workflow:
              - '.github/workflows/cd-backend.yml'
              - 'k8s/**'
            gateway:
              - 'ApiGateways/YarpApiGateway/**'
            identity:
              - 'Services/Identity/**'
            course:
              - 'Services/Course/**'
            exam:
              - 'Services/Exam/**'
            notification:
              - 'Services/Notification/**'
            comment:
              - 'Services/Comment/**'
            payment:
              - 'Services/Payment/**'

  build-and-deploy-gateway:
    name: Build & Deploy Gateway
    needs: detect-changes
    if: needs.detect-changes.outputs.gateway == 'true' || needs.detect-changes.outputs.shared == 'true' || needs.detect-changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Downcase Repository Name
        run: |
          echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ApiGateways/YarpApiGateway/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LOWER }}/smartedu-gateway:latest
            ghcr.io/${{ env.REPO_LOWER }}/smartedu-gateway:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS Context
        uses: azure/aks-set-context@v3
        with:
          resource-group: SmartEdu-RG
          cluster-name: smartedu-cluster

      - name: Deploy to AKS
        uses: azure/k8s-deploy@v4
        with:
          manifests: |
            k8s/gateway.yaml
          images: |
            ghcr.io/${{ env.REPO_LOWER }}/smartedu-gateway:${{ github.sha }}
          imagepullsecrets: |
            ghcr-io-registry-key


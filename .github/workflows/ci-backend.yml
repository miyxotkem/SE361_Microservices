name: Backend CI

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'Services/**'
      - 'BuildingBlocks/**'
      - 'ApiGateways/**'
      - '.github/workflows/ci-backend.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'Services/**'
      - 'BuildingBlocks/**'
      - 'ApiGateways/**'
      - '.github/workflows/ci-backend.yml'

jobs:
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      shared: ${{ steps.filter.outputs.shared }}
      workflow: ${{ steps.filter.outputs.workflow }}
      gateway: ${{ steps.filter.outputs.gateway }}
      identity: ${{ steps.filter.outputs.identity }}
      course: ${{ steps.filter.outputs.course }}
      exam: ${{ steps.filter.outputs.exam }}
      notification: ${{ steps.filter.outputs.notification }}
      comment: ${{ steps.filter.outputs.comment }}
      payment: ${{ steps.filter.outputs.payment }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Path Filter
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            shared:
              - 'BuildingBlocks/**'
            workflow:
              - '.github/workflows/ci-backend.yml'
            gateway:
              - 'ApiGateways/YarpApiGateway/**'
            identity:
              - 'Services/Identity/**'
            course:
              - 'Services/Course/**'
            exam:
              - 'Services/Exam/**'
            notification:
              - 'Services/Notification/**'
            comment:
              - 'Services/Comment/**'
            payment:
              - 'Services/Payment/**'

  ci-gateway:
    name: CI Gateway
    needs: detect-changes
    if: needs.detect-changes.outputs.gateway == 'true' || needs.detect-changes.outputs.shared == 'true' || needs.detect-changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Build Service
        run: dotnet build ApiGateways/YarpApiGateway/YarpApiGateway.csproj -c Release

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Dockerfile Build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ApiGateways/YarpApiGateway/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  ci-identity:
    name: CI Identity
    needs: detect-changes
    if: needs.detect-changes.outputs.identity == 'true' || needs.detect-changes.outputs.shared == 'true' || needs.detect-changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Build Service
        run: dotnet build Services/Identity/Identity.API/Identity.API.csproj -c Release

      - name: Run Tests
        run: |
          dotnet test tests/Services/Identity/Identity.API.Tests/Identity.API.Tests.csproj -c Release
          dotnet test tests/Services/Identity/Identity.API.IntegrationTests/Identity.API.IntegrationTests.csproj -c Release

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Dockerfile Build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Services/Identity/Identity.API/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  ci-course:
    name: CI Course
    needs: detect-changes
    if: needs.detect-changes.outputs.course == 'true' || needs.detect-changes.outputs.shared == 'true' || needs.detect-changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Build Service
        run: dotnet build Services/Course/Course.API/Course.API.csproj -c Release

      - name: Run Tests
        run: |
          dotnet test tests/Services/Course/Course.API.Tests/Course.API.Tests.csproj -c Release
          dotnet test tests/Services/Course/Course.API.IntegrationTests/Course.API.IntegrationTests.csproj -c Release

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Dockerfile Build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Services/Course/Course.API/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  ci-exam:
    name: CI Exam
    needs: detect-changes
    if: needs.detect-changes.outputs.exam == 'true' || needs.detect-changes.outputs.shared == 'true' || needs.detect-changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Build Service
        run: dotnet build Services/Exam/Exam.API/Exam.API.csproj -c Release

      - name: Run Tests
        run: |
          dotnet test tests/Services/Exam/Exam.Tests/Exam.Tests.csproj -c Release
          dotnet test tests/Services/Exam/Exam.API.IntegrationTests/Exam.API.IntegrationTests.csproj -c Release

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Dockerfile Build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Services/Exam/Exam.API/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  ci-notification:
    name: CI Notification
    needs: detect-changes
    if: needs.detect-changes.outputs.notification == 'true' || needs.detect-changes.outputs.shared == 'true' || needs.detect-changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Build Service
        run: dotnet build Services/Notification/Notification.API/Notification.API.csproj -c Release

      - name: Run Tests
        run: |
          dotnet test tests/Services/Notification/Notification.API.Tests/Notification.API.Tests.csproj -c Release
          dotnet test tests/Services/Notification/Notification.API.IntegrationTests/Notification.API.IntegrationTests.csproj -c Release

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Dockerfile Build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Services/Notification/Notification.API/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  ci-comment:
    name: CI Comment
    needs: detect-changes
    if: needs.detect-changes.outputs.comment == 'true' || needs.detect-changes.outputs.shared == 'true' || needs.detect-changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Build Service
        run: dotnet build Services/Comment/Comment.API/Comment.API.csproj -c Release

      - name: Run Tests
        run: |
          dotnet test tests/Services/Comment/Comment.API.Tests/Comment.API.Tests.csproj -c Release
          dotnet test tests/Services/Comment/Comment.API.IntegrationTests/Comment.API.IntegrationTests.csproj -c Release

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Dockerfile Build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Services/Comment/Comment.API/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  ci-payment:
    name: CI Payment
    needs: detect-changes
    if: needs.detect-changes.outputs.payment == 'true' || needs.detect-changes.outputs.shared == 'true' || needs.detect-changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Build Service
        run: dotnet build Services/Payment/Payment.API/Payment.API.csproj -c Release

      - name: Run Tests
        run: |
          dotnet test tests/Services/Payment/Payment.API.Tests/Payment.API.Tests.csproj -c Release
          dotnet test tests/Services/Payment/Payment.API.IntegrationTests/Payment.API.IntegrationTests.csproj -c Release

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Dockerfile Build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Services/Payment/Payment.API/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

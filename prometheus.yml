global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8889']
    metric_relabel_configs:
      - source_labels: [exported_job]
        target_label: job
        action: replace
        regex: (.+)
      - source_labels: [exported_instance]
        target_label: instance
        action: replace
        regex: (.+)

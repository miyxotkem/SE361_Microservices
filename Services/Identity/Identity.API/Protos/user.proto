syntax = "proto3";

option csharp_namespace = "Identity.API.Grpc";

package user;

service UserProtoService {
    rpc GetUserProfile (GetUserProfileRequest) returns (UserProfileModel);
}

message GetUserProfileRequest {
    string userId = 1;
}

message UserProfileModel {
    string userId = 1;
    string fullName = 2;
    string email = 3;
    string role = 4;
}
